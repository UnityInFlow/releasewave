version: 2

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    main: ./cmd/releasewave

archives:
  - format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - repository:
      owner: UnityInFlow
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/UnityInFlow/releasewave"
    description: "Universal release/version aggregator for microservices with MCP server support"
    license: "MIT"
    test: |
      system "#{bin}/releasewave", "version"

dockers:
  - image_templates:
      - "ghcr.io/unityinflow/releasewave:{{.Version}}"
      - "ghcr.io/unityinflow/releasewave:latest"
    dockerfile: Dockerfile.goreleaser
    goarch: amd64
    goos: linux
